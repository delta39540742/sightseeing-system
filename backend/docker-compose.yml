# Giữ project name = travelsystem để dùng đúng volume cũ travelsystem_postgres_data
# (trước đây compose chạy từ directory tên 'travelsystem', giờ là 'backend').
name: travelsystem

services:
  postgres:
    # Build custom: postgis/postgis:15-3.3 + pgvector. Cùng major Postgres 15
    # nên volume cũ vẫn dùng được, không mất data.
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: tdtt-postgres-pgvector:15-3.3
    restart: always
    environment:
      POSTGRES_USER: tdtt_user
      POSTGRES_PASSWORD: tdtt_password
      POSTGRES_DB: tdtt_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
